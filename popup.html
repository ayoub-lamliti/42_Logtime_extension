<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logtime Companion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 300px;
            background: #111114;
            color: #d4d4e0;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            user-select: none;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .p-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px 12px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.07);
            background: #0e0e11;
        }

        .p-logo {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            background: #00d97e18;
            border: 0.5px solid #00d97e40;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .p-logo svg {
            display: block;
        }

        .p-title {
            font-size: 12.5px;
            font-weight: 600;
            color: #e8e8f2;
            letter-spacing: 0.01em;
        }

        .p-subtitle {
            font-size: 10.5px;
            color: #8e8e9f;
            margin-top: 1px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.03em;
        }

        .p-status-dot {
            margin-left: auto;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00d97e;
            box-shadow: 0 0 6px #00d97e80;
            flex-shrink: 0;
        }

        .p-status-dot.offline {
            background: #555566;
            box-shadow: none;
        }

        .p-status-dot.error {
            background: #f06464;
            box-shadow: 0 0 6px #f0646460;
        }

        /* ── VIEWS ── */
        .p-view {
            display: none;
        }

        .p-view.active {
            display: flex;
            flex-direction: column;
        }

        /* ── LOADING VIEW ── */
        .p-loading {
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 42px 0;
            color: #8e8e9f;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .p-spinner {
            width: 16px;
            height: 16px;
            border: 1.5px solid #22222e;
            border-top-color: #00d97e;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── AUTH VIEW ── */
        .p-auth {
            padding: 28px 20px;
            align-items: center;
            gap: 14px;
            text-align: center;
        }

        .p-auth-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #1a1a22;
            border: 0.5px solid rgba(255, 255, 255, 0.07);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .p-auth-desc {
            font-size: 12px;
            color: #8e8e9f;
            line-height: 1.7;
            max-width: 220px;
        }

        /* ── MAIN VIEW ── */
        .p-main {
            padding: 0;
        }

        .p-section {
            padding: 14px 16px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .p-section:last-child {
            border-bottom: none;
        }

        /* Timer row */
        .timer-row {
            display: flex;
            align-items: stretch;
            gap: 0;
        }

        .timer-cell {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 0;
        }

        .timer-cell+.timer-cell {
            border-left: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .timer-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 26px;
            font-weight: 700;
            color: #e8e8f2;
            line-height: 1;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .timer-val.accent {
            color: #00d97e;
        }

        .timer-val.warn {
            color: #f7b731;
        }

        .timer-lbl {
            font-size: 9.5px;
            color: #8e8e9f;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Hours section */
        .hours-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 12px;
        }

        .hours-big {
            font-family: 'JetBrains Mono', monospace;
            font-size: 38px;
            font-weight: 700;
            color: #e8e8f2;
            line-height: 1;
            letter-spacing: -0.03em;
            font-variant-numeric: tabular-nums;
        }

        .hours-unit {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            color: #8e8e9f;
            font-weight: 600;
        }

        .hours-quota {
            margin-left: auto;
            font-size: 11px;
            color: #8e8e9f;
            font-family: 'JetBrains Mono', monospace;
            align-self: center;
        }

        /* Progress */
        .prog-track {
            height: 4px;
            background: #1c1c26;
            border-radius: 99px;
            overflow: visible;
            position: relative;
            margin-bottom: 10px;
        }

        .prog-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            border-radius: 99px;
            background: #00d97e;
            transition: width 0.5s cubic-bezier(.4, 0, .2, 1), background 0.4s;
            box-shadow: 0 0 8px #00d97e60;
            width: 0%;
        }

        .prog-fill.warn {
            background: #f7b731;
            box-shadow: 0 0 8px #f7b73160;
        }

        .prog-fill.danger {
            background: #f06464;
            box-shadow: 0 0 8px #f0646460;
        }

        .prog-tick {
            position: absolute;
            top: -4px;
            bottom: -4px;
            width: 1px;
            background: rgba(255, 255, 255, 0.06);
        }

        .prog-labels {
            display: flex;
            justify-content: space-between;
            font-size: 9.5px;
            color: #8e8e9f;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.04em;
            padding: 0 1px;
            margin-bottom: 8px;
        }

        .prog-status {
            font-size: 11px;
            color: #8e8e9f;
            text-align: center;
            line-height: 1.5;
            font-family: 'JetBrains Mono', monospace;
        }

        .prog-status .highlight {
            color: #00d97e;
        }

        .prog-status .highlight.warn {
            color: #f7b731;
        }

        /* Select */
        .p-select-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .p-select-lbl {
            font-size: 11px;
            color: #8e8e9f;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .p-select {
            flex: 1;
            background: #18181e;
            color: #e8e8f2;
            border: 0.5px solid rgba(255, 255, 255, 0.07);
            border-radius: 6px;
            padding: 5px 8px;
            font-size: 11.5px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            cursor: pointer;
        }

        .p-select:focus {
            border-color: rgba(0, 217, 126, 0.3);
        }

        /* Action row */
        .p-actions {
            display: flex;
            gap: 6px;
            padding: 12px 16px 14px;
        }

        .p-btn {
            flex: 1;
            height: 32px;
            border-radius: 7px;
            border: 0.5px solid rgba(255, 255, 255, 0.07);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s, border-color 0.15s;
        }

        .p-btn-refresh {
            background: #18181e;
            color: #8e8e9f;
        }

        .p-btn-refresh:hover {
            background: #1f1f2a;
            color: #e8e8f2;
        }

        .p-btn-logout {
            background: transparent;
            color: #f06464;
            border-color: transparent;
            opacity: 0.8;
        }

        .p-btn-logout:hover {
            background: rgba(240, 100, 100, 0.08);
            color: #f06464;
            border-color: rgba(240, 100, 100, 0.2);
            opacity: 1;
        }

        /* Error view */
        .p-error {
            padding: 32px 20px;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        .p-error-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(240, 100, 100, 0.08);
            border: 0.5px solid rgba(240, 100, 100, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .p-error-title {
            font-size: 13px;
            font-weight: 600;
            color: #e8e8f2;
        }

        .p-error-msg {
            font-size: 11px;
            color: #8e8e9f;
            line-height: 1.7;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Footer */
        .p-footer {
            padding: 8px 16px;
            font-size: 9.5px;
            color: #8e8e9f;
            display: flex;
            justify-content: space-between;
            border-top: 0.5px solid rgba(255, 255, 255, 0.04);
            background: #0d0d10;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.03em;
        }

        /* Connect btn */
        .p-btn-connect {
            width: 100%;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: #00d97e14;
            border: 0.5px solid #00d97e35;
            color: #00d97e;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: background 0.15s;
        }

        .p-btn-connect:hover {
            background: #00d97e22;
        }

        .p-btn-retry {
            height: 32px;
            padding: 0 16px;
            border-radius: 7px;
            border: 0.5px solid rgba(255, 255, 255, 0.07);
            background: #18181e;
            color: #8e8e9f;
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.15s;
        }

        .p-btn-retry:hover {
            background: #1f1f2a;
            color: #e8e8f2;
        }
    </style>
</head>

<body>
    <div class="p-header">
        <div class="p-logo">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <circle cx="7" cy="7" r="5.5" stroke="#00d97e" stroke-width="1.25" />
                <path d="M7 3.5V7l2.5 1.5" stroke="#00d97e" stroke-width="1.25" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </div>
        <div>
            <div class="p-title">Logtime Companion</div>
            <div class="p-subtitle">42Network tracker</div>
        </div>
        <div class="p-status-dot offline" id="status-dot"></div>
    </div>

    <div class="p-view p-loading" id="view-loading">
        <div class="p-spinner"></div><span>fetching logtime...</span>
    </div>

    <div class="p-view p-auth" id="view-auth">
        <div class="p-auth-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <rect x="3" y="9" width="16" height="11" rx="2.5" stroke="#3a3a50" stroke-width="1.25" />
                <path d="M7 9V6.5a4 4 0 0 1 8 0V9" stroke="#3a3a50" stroke-width="1.25" stroke-linecap="round" />
                <circle cx="11" cy="14.5" r="1.5" fill="#3a3a50" />
            </svg>
        </div>
        <p class="p-auth-desc">Connect your 42 account to track weekly logtime and milestone alerts.</p>
        <button class="p-btn-connect"><svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1L9.5 5H13l-3 2.5 1.5 4L7 9l-4.5 2.5L4 7.5 1 5h3.5L7 1z" fill="#00d97e" opacity=".8" />
            </svg>Connect with 42</button>
    </div>

    <div class="p-view p-main" id="view-main">
        <div class="p-section" style="padding: 10px 0;">
            <div class="timer-row">
                <div class="timer-cell"><span class="timer-val accent" id="t-days">--</span><span
                        class="timer-lbl">days</span></div>
                <div class="timer-cell"><span class="timer-val" id="t-hours">--</span><span
                        class="timer-lbl">hours</span></div>
                <div class="timer-cell"><span class="timer-val" id="t-mins">--</span><span class="timer-lbl">mins</span>
                </div>
            </div>
        </div>
        <div class="p-section">
            <div class="hours-row">
                <span class="hours-big" id="h-value">0.0</span><span class="hours-unit">h</span><span
                    class="hours-quota">/ 30h</span>
            </div>
            <div class="prog-track">
                <div class="prog-tick" style="left: 66.66%;"></div>
                <div class="prog-tick" style="left: 83.33%;"></div>
                <div class="prog-fill" id="prog-fill"></div>
            </div>
            <div class="prog-labels"><span>0h</span><span>20h</span><span>25h</span><span>30h</span></div>
            <p class="prog-status" id="prog-status">Calculating...</p>
        </div>
        <div class="p-section" style="padding-top: 10px; padding-bottom: 10px;">
            <div class="p-select-wrap">
                <span class="p-select-lbl">Week starts</span>
                <select class="p-select" id="week-start">
                    <option value="0">Sunday</option>
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3">Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5">Friday</option>
                    <option value="6">Saturday</option>
                </select>
            </div>
        </div>
        <div class="p-actions">
            <button class="p-btn p-btn-refresh"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"
                    stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
                    <path d="M9.5 2A5 5 0 1 0 10 5.5" />
                    <path d="M10 1v2.5H7.5" />
                </svg>Refresh</button>
            <button class="p-btn p-btn-logout">Sign out</button>
        </div>
    </div>

    <div class="p-view p-error" id="view-error">
        <div class="p-error-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 6v4M9 12.5v.5" stroke="#f06464" stroke-width="1.4" stroke-linecap="round" />
                <path d="M1.5 15L9 3l7.5 12H1.5z" stroke="#f06464" stroke-width="1.2" stroke-linejoin="round" />
            </svg></div>
        <div class="p-error-title">Request failed</div>
        <p class="p-error-msg" id="error-msg"></p>
        <button class="p-btn-retry">Try again</button>
    </div>

    <div class="p-footer"><span>auto-refresh 15min</span><span>42 API</span></div>

    <script src="popup.js"></script>
</body>

</html>

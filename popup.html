<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logtime Companion</title>
    <style>
        /* ── Variables ─────────────────────────────────────────────────────── */
        :root {
            --color-bg: #0d0d0f;
            --color-surface: #18181c;
            --color-surface-2: #23232a;
            --color-border: #2e2e38;
            --color-text: #e8e8f0;
            --color-text-muted: #6e6e82;
            --color-accent: #7b61ff;
            --color-accent-dim: rgba(123, 97, 255, 0.15);
            --color-success: #3ecf8e;
            --color-warning: #f7b731;
            --color-danger: #f06464;
            --radius: 10px;
            --transition: 0.2s ease;
        }

        /* ── Reset ─────────────────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── Base ──────────────────────────────────────────────────────────── */
        body {
            width: 300px;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
                sans-serif;
            font-size: 14px;
            line-height: 1.5;
            user-select: none;
            overflow: hidden;
        }

        /* ── Shell ─────────────────────────────────────────────────────────── */
        .shell {
            display: flex;
            flex-direction: column;
            min-height: 200px;
        }

        /* ── Header ────────────────────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 18px 14px;
            border-bottom: 1px solid var(--color-border);
        }

        .header__logo {
            width: 28px;
            height: 28px;
            background: var(--color-accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .header__title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--color-text);
        }

        .header__subtitle {
            font-size: 11px;
            color: var(--color-text-muted);
            margin-top: 1px;
        }

        /* ── Views ─────────────────────────────────────────────────────────── */
        [hidden] {
            display: none !important;
        }

        /* ── Loading view ──────────────────────────────────────────────────── */
        #view-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 48px 0;
            color: var(--color-text-muted);
            font-size: 13px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--color-border);
            border-top-color: var(--color-accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Unauthenticated view ──────────────────────────────────────────── */
        #view-unauthenticated {
            padding: 28px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            text-align: center;
        }

        .connect-desc {
            font-size: 12px;
            color: var(--color-text-muted);
            line-height: 1.6;
        }

        /* ── Authenticated view ────────────────────────────────────────────── */
        #view-authenticated {
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Hours display */
        .hours-display {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .hours-value {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--color-text);
            font-variant-numeric: tabular-nums;
        }

        .hours-unit {
            font-size: 16px;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .hours-quota {
            font-size: 13px;
            color: var(--color-text-muted);
            margin-left: auto;
            align-self: center;
        }

        /* Progress bar */
        .progress-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-bar {
            height: 6px;
            background: var(--color-surface-2);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            background: var(--color-accent);
            transition: width 0.4s ease, background-color 0.4s ease;
            width: 0%;
        }

        /* Milestone tick marks */
        .progress-ticks {
            position: relative;
            height: 0;
        }

        .progress-tick {
            position: absolute;
            top: -14px;
            transform: translateX(-50%);
            width: 1px;
            height: 10px;
            background: var(--color-border);
        }

        .progress-tick-label {
            position: absolute;
            top: -28px;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--color-text-muted);
            white-space: nowrap;
        }

        .status-text {
            font-size: 11px;
            color: var(--color-text-muted);
            text-align: center;
        }

        /* Action row */
        .action-row {
            display: flex;
            gap: 8px;
        }

        /* ── Error view ────────────────────────────────────────────────────── */
        #view-error {
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
        }

        .error-icon {
            font-size: 28px;
        }

        .error-title {
            font-size: 13px;
            font-weight: 600;
        }

        .error-msg {
            font-size: 11px;
            color: var(--color-text-muted);
            line-height: 1.6;
            word-break: break-word;
        }

        /* ── Buttons ───────────────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition), opacity var(--transition);
            padding: 0 14px;
            height: 36px;
            font-family: inherit;
            white-space: nowrap;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn--primary {
            background: var(--color-accent);
            color: #fff;
            width: 100%;
        }

        .btn--primary:hover:not(:disabled) {
            background: #6b51ef;
        }

        .btn--ghost {
            background: var(--color-surface-2);
            color: var(--color-text-muted);
            flex: 1;
        }

        .btn--ghost:hover:not(:disabled) {
            background: var(--color-border);
            color: var(--color-text);
        }

        .btn--danger-ghost {
            background: transparent;
            color: var(--color-danger);
            border: 1px solid transparent;
            flex: 1;
        }

        .btn--danger-ghost:hover:not(:disabled) {
            background: rgba(240, 100, 100, 0.1);
            border-color: var(--color-danger);
        }

        /* ── Divider ───────────────────────────────────────────────────────── */
        .divider {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 0;
        }

        /* ── Footer ────────────────────────────────────────────────────────── */
        .footer {
            padding: 10px 18px;
            font-size: 10px;
            color: var(--color-text-muted);
            text-align: center;
            border-top: 1px solid var(--color-border);
        }
    </style>
</head>

<body>
    <div class="shell">
        <!-- Header -->
        <div class="header">
            <div class="header__logo">⏱</div>
            <div>
                <div class="header__title">Logtime Companion</div>
                <div class="header__subtitle">42 Network · Weekly Tracker</div>
            </div>
        </div>

        <!-- ── View: Loading ─────────────────────────────────────────────── -->
        <div id="view-loading">
            <div class="spinner"></div>
            <span>Loading…</span>
        </div>

        <!-- ── View: Not authenticated ───────────────────────────────────── -->
        <div id="view-unauthenticated" hidden>
            <p class="connect-desc">
                Connect your 42 account to track your weekly logtime and receive
                milestone notifications.
            </p>
            <button id="btn-connect" class="btn btn--primary">
                🔐 Connect with 42
            </button>
        </div>

        <!-- ── View: Authenticated ───────────────────────────────────────── -->
        <div id="view-authenticated" hidden>
            <div style="margin-top: 15px;">
                <label style="font-size: 11px; color: var(--color-text-muted);">Week starts on:</label>
                <select id="start-day-select" style="background: var(--color-surface-2); color: white; border: 1px solid var(--color-border); padding: 5px; border-radius: 5px; width: 100%; margin-top: 5px;">
                    <option value="0">Sunday</option>
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3">Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5">Friday</option>
                    <option value="6">Saturday</option>
                </select>
            </div>
            <!-- Hours display -->
            <div>
                <div class="hours-display">
                    <span class="hours-value" id="hours-value">0.0</span>
                    <span class="hours-unit">h</span>
                    <span class="hours-quota">/ 30h</span>
                </div>
            </div>

            <!-- Progress bar with milestone ticks -->
            <div class="progress-wrap">
                <div class="progress-bar" style="position:relative;">
                    <!-- Milestone tick marks at 20h and 25h -->
                    <div
                        style="position:absolute;top:0;bottom:0;left:66.66%;width:1px;background:rgba(255,255,255,0.15);z-index:1;">
                    </div>
                    <div
                        style="position:absolute;top:0;bottom:0;left:83.33%;width:1px;background:rgba(255,255,255,0.15);z-index:1;">
                    </div>
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <!-- Tick labels -->
                <div style="position:relative;height:14px;font-size:9px;color:var(--color-text-muted);">
                    <span style="position:absolute;left:66.66%;transform:translateX(-50%);">20h</span>
                    <span style="position:absolute;left:83.33%;transform:translateX(-50%);">25h</span>
                    <span style="position:absolute;right:0;">30h</span>
                </div>
                <p class="status-text" id="status-text"></p>
            </div>

            <hr class="divider" />

            <!-- Action row -->
            <div class="action-row">
                <button id="btn-refresh" class="btn btn--ghost">↻ Refresh</button>
                <button id="btn-logout" class="btn btn--danger-ghost">Sign out</button>
            </div>
        </div>

        <!-- ── View: Error ───────────────────────────────────────────────── -->
        <div id="view-error" hidden>
            <div class="error-icon">⚠️</div>
            <div class="error-title">Something went wrong</div>
            <p class="error-msg" id="error-msg"></p>
            <button id="btn-retry" class="btn btn--ghost">Try again</button>
        </div>
    </div>

    <!-- Footer shown always -->
    <div class="footer">Updates every 15 min · Data from 42 API</div>

    <script type="module" src="popup.js"></script>
</body>

</html>
